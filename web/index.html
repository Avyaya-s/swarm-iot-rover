<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rover Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1.3.0/build/roslib.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #1a1a1a;
        }

        .logo span {
            color: #6b7280;
            font-weight: 400;
        }

        #status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid;
        }

        #status.disconnected {
            color: #dc2626;
            border-color: #fecaca;
            background: #fef2f2;
        }

        #status.connected {
            color: #16a34a;
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        #status.error {
            color: #d97706;
            border-color: #fde68a;
            background: #fffbeb;
        }

        /* ── Main layout ── */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            height: calc(100vh - 56px);
        }

        /* ── Left panel ── */
        aside {
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            overflow-y: auto;
        }

        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }

        .card {
            background: #f8f9fa;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .data-row:last-child { border-bottom: none; }

        .data-label {
            font-size: 12px;
            color: #6b7280;
        }

        .data-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .data-value.yaw { color: #2563eb; }

        .sensor-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .dot-front { background: #ef4444; }
        .dot-left  { background: #16a34a; }
        .dot-right { background: #2563eb; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .stat-row:last-child { border-bottom: none; }

        .stat-label { font-size: 12px; color: #6b7280; }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #2563eb;
        }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.15s;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #ffffff;
            border-color: #1a1a1a;
            margin-bottom: 8px;
        }

        .btn-primary:hover { background: #374151; border-color: #374151; }

        .btn-secondary {
            background: #ffffff;
            color: #374151;
            border-color: #d1d5db;
        }

        .btn-secondary:hover { background: #f3f4f6; }

        /* ── Map canvas ── */
        .map-container {
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .map-title {
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            letter-spacing: 0.05em;
        }

        .map-legend {
            display: flex;
            gap: 1rem;
            font-size: 11px;
            color: #9ca3af;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-wall  { width: 10px; height: 10px; background: #1a1a1a; border-radius: 2px; }
        .legend-free  { width: 10px; height: 10px; background: #f0f4ff; border: 1px solid #e5e7eb; border-radius: 2px; }
        .legend-path  { width: 16px; height: 2px; background: #2563eb; border-radius: 1px; }
        .legend-robot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; }

        canvas {
            flex: 1;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Rover <span>Command Center</span></div>
    <div id="status" class="disconnected">DISCONNECTED</div>
</header>

<main>
    <aside>

        <div>
            <div class="section-label">Live Telemetry</div>
            <div class="card">
                <div class="data-row">
                    <span class="data-label">Heading (Yaw)</span>
                    <span id="telemetry-yaw" class="data-value yaw">0.0°</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Odometry X</span>
                    <span id="telemetry-x" class="data-value">0.00 m</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Odometry Y</span>
                    <span id="telemetry-y" class="data-value">0.00 m</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">Sensor Distances</div>
            <div class="card">
                <div class="data-row">
                    <span class="data-label"><span class="sensor-dot dot-front"></span>Front</span>
                    <span id="sensor-front" class="data-value">--- cm</span>
                </div>
                <div class="data-row">
                    <span class="data-label"><span class="sensor-dot dot-left"></span>Left</span>
                    <span id="sensor-left" class="data-value">--- cm</span>
                </div>
                <div class="data-row">
                    <span class="data-label"><span class="sensor-dot dot-right"></span>Right</span>
                    <span id="sensor-right" class="data-value">--- cm</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">Map Stats</div>
            <div class="card">
                <div class="stat-row">
                    <span class="stat-label">Map Updates</span>
                    <span id="map-updates" class="stat-value">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Cells Mapped</span>
                    <span id="map-cells" class="stat-value">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Path Points</span>
                    <span id="path-points" class="stat-value">0</span>
                </div>
            </div>
        </div>

        <div>
            <div class="section-label">Controls</div>
            <button class="btn btn-primary" onclick="resetView()">Reset View</button>
            <button class="btn btn-secondary" onclick="clearAll()">Clear Map & Path</button>
        </div>

    </aside>

    <div class="map-container">
        <div class="map-header">
            <span class="map-title">2D OCCUPANCY MAP</span>
            <div class="map-legend">
                <div class="legend-item"><div class="legend-wall"></div> Wall</div>
                <div class="legend-item"><div class="legend-free"></div> Free</div>
                <div class="legend-item"><div class="legend-path"></div> Path</div>
                <div class="legend-item"><div class="legend-robot"></div> Robot</div>
            </div>
        </div>
        <canvas id="mapCanvas"></canvas>
    </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
window._robotX      = 0;
window._robotY      = 0;
window._robotYaw    = 0;
window._lastMap     = null;
window._pathHistory = [];
let mapUpdateCount  = 0;
const PATH_MIN_DIST = 0.05;

// ── ROS ───────────────────────────────────────────────────────────────────
const ros = new ROSLIB.Ros({ url: 'ws://localhost:9090' });
const statusEl = document.getElementById('status');

ros.on('connection', () => {
    statusEl.innerText = 'CONNECTED';
    statusEl.className = 'connected';
    subscribeTopics();
});
ros.on('error', () => {
    statusEl.innerText = 'ERROR';
    statusEl.className = 'error';
});
ros.on('close', () => {
    statusEl.innerText = 'DISCONNECTED';
    statusEl.className = 'disconnected';
});

// ── Subscriptions ─────────────────────────────────────────────────────────
function subscribeTopics() {

    new ROSLIB.Topic({ ros, name: '/odom', messageType: 'nav_msgs/msg/Odometry' })
    .subscribe(msg => {
        const x      = msg.pose.pose.position.x;
        const y      = msg.pose.pose.position.y;
        const qz     = msg.pose.pose.orientation.z;
        const qw     = msg.pose.pose.orientation.w;
        const yawRad = 2 * Math.atan2(qz, qw);

        window._robotX   = x;
        window._robotY   = y;
        window._robotYaw = yawRad;

        const path = window._pathHistory;
        if (path.length === 0) {
            path.push({ x, y });
        } else {
            const last = path[path.length - 1];
            const dx = x - last.x, dy = y - last.y;
            if (Math.sqrt(dx*dx + dy*dy) >= PATH_MIN_DIST) {
                path.push({ x, y });
                document.getElementById('path-points').innerText = path.length;
            }
        }

        document.getElementById('telemetry-x').innerText = x.toFixed(2) + ' m';
        document.getElementById('telemetry-y').innerText = y.toFixed(2) + ' m';
        let yawDeg = yawRad * 180 / Math.PI;
        if (yawDeg < 0) yawDeg += 360;
        document.getElementById('telemetry-yaw').innerText = yawDeg.toFixed(1) + '°';

        if (window._lastMap) drawMap(window._lastMap);
    });

    [
        { topic: '/sensor/front', el: 'sensor-front' },
        { topic: '/sensor/left',  el: 'sensor-left'  },
        { topic: '/sensor/right', el: 'sensor-right' },
    ].forEach(s => {
        new ROSLIB.Topic({ ros, name: s.topic, messageType: 'sensor_msgs/msg/Range' })
        .subscribe(msg => {
            document.getElementById(s.el).innerText = (msg.range * 100).toFixed(0) + ' cm';
        });
    });

    function subscribeMap() {
        const mapTopic = new ROSLIB.Topic({
            ros, name: '/map', messageType: 'nav_msgs/msg/OccupancyGrid'
        });
        mapTopic.subscribe(msg => {
            mapUpdateCount++;
            document.getElementById('map-updates').innerText = mapUpdateCount;
            document.getElementById('map-cells').innerText = msg.data.filter(v => v !== -1).length;
            window._lastMap = msg;
            drawMap(msg);
        });
        return mapTopic;
    }

    let mapTopic = subscribeMap();
    const retry = setInterval(() => {
        if (window._lastMap) { clearInterval(retry); return; }
        mapTopic.unsubscribe();
        mapTopic = subscribeMap();
    }, 3000);
}

// ── Map renderer ──────────────────────────────────────────────────────────
function drawMap(msg) {
    const canvas   = document.getElementById('mapCanvas');
    const ctx      = canvas.getContext('2d');
    const displayW = canvas.clientWidth;
    const displayH = canvas.clientHeight;
    if (canvas.width !== displayW || canvas.height !== displayH) {
        canvas.width  = displayW;
        canvas.height = displayH;
    }

    const W   = msg.info.width;
    const H   = msg.info.height;
    const res = msg.info.resolution;
    const ox  = msg.info.origin.position.x;
    const oy  = msg.info.origin.position.y;

    // Bounding box of known cells
    let minX = W, maxX = 0, minY = H, maxY = 0;
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            if (msg.data[y * W + x] !== -1) {
                if (x < minX) minX = x; if (x > maxX) maxX = x;
                if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
        }
    }

    const allPoints = [{ x: window._robotX, y: window._robotY }, ...window._pathHistory];
    allPoints.forEach(p => {
        const cx = Math.floor((p.x - ox) / res);
        const cy = Math.floor((p.y - oy) / res);
        if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
        if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
    });

    const PAD = 12;
    minX = Math.max(0, minX - PAD); minY = Math.max(0, minY - PAD);
    maxX = Math.min(W-1, maxX + PAD); maxY = Math.min(H-1, maxY + PAD);

    const spanX   = maxX - minX + 1;
    const spanY   = maxY - minY + 1;
    const scale   = Math.min(displayW / spanX, displayH / spanY);
    const offsetX = (displayW - spanX * scale) / 2;
    const offsetY = (displayH - spanY * scale) / 2;

    const toCanvas = (wx, wy) => ({
        px: offsetX + (Math.floor((wx - ox) / res) - minX) * scale,
        py: offsetY + (maxY - Math.floor((wy - oy) / res)) * scale
    });

    // Background — white
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, displayW, displayH);

    // Draw subtle grid
    ctx.strokeStyle = '#f0f0f0';
    ctx.lineWidth = 0.5;
    const gridStep = Math.max(1, Math.round(10 / scale)) * scale;
    for (let x = offsetX % gridStep; x < displayW; x += gridStep) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, displayH); ctx.stroke();
    }
    for (let y = offsetY % gridStep; y < displayH; y += gridStep) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(displayW, y); ctx.stroke();
    }

    // Draw cells
    const cellPx = Math.max(1, Math.ceil(scale));
    for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
            const val = msg.data[y * W + x];
            if (val === -1) continue;
            const px = offsetX + (x - minX) * scale;
            const py = offsetY + (maxY - y) * scale;
            ctx.fillStyle = val >= 50 ? '#1a1a1a' : '#f0f4ff';
            ctx.fillRect(px, py, cellPx, cellPx);
        }
    }

    // Path trail — blue
    const path = window._pathHistory;
    if (path.length > 1) {
        ctx.beginPath();
        const start = toCanvas(path[0].x, path[0].y);
        ctx.moveTo(start.px, start.py);
        for (let i = 1; i < path.length; i++) {
            const pt = toCanvas(path[i].x, path[i].y);
            ctx.lineTo(pt.px, pt.py);
        }
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth   = 2;
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';
        ctx.stroke();
    }

    // Robot dot — red
    const robot = toCanvas(window._robotX, window._robotY);
    const dotR  = Math.max(5, scale * 1.5);

    ctx.beginPath();
    ctx.arc(robot.px, robot.py, dotR, 0, Math.PI * 2);
    ctx.fillStyle = '#ef4444';
    ctx.fill();

    // Heading arrow — red
    const arrowLen = dotR * 3;
    ctx.beginPath();
    ctx.moveTo(robot.px, robot.py);
    ctx.lineTo(
        robot.px + arrowLen * Math.cos(window._robotYaw),
        robot.py - arrowLen * Math.sin(window._robotYaw)
    );
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth   = 2;
    ctx.stroke();
}

function resetView() { if (window._lastMap) drawMap(window._lastMap); }

function clearAll() {
    window._pathHistory = [];
    window._lastMap     = null;
    mapUpdateCount      = 0;
    document.getElementById('map-updates').innerText  = '0';
    document.getElementById('map-cells').innerText    = '0';
    document.getElementById('path-points').innerText  = '0';
    const canvas = document.getElementById('mapCanvas');
    const ctx    = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', () => { if (window._lastMap) drawMap(window._lastMap); });
</script>
</body>
</html>
